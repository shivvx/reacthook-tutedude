<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tutedude - Premium Hook</title>
    <style>
      body { margin: 0; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
      #root:empty::after { content: 'Initializing Premium Experience...'; opacity: 0.5; }
    </style>
    <script>
      window.onerror = function(msg, url, line) {
        document.body.innerHTML = '<div style="padding:20px; color:#ef4444; text-align:center;"><h3>Runtime Error</h3><p>' + msg + '</p></div>';
      };
      document.addEventListener("DOMContentLoaded", function() {
        document.body.style.backgroundColor = '#0f172a';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
